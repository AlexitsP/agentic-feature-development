name: PR Validation

# Scoped for this experiment repo: validates the app code we actually ship
# (frontend build/lint + Temporal worker tests). The template's factory/deploy
# checks (helm profiles, supabase demo-user seeds, image builds, architecture
# audit) require infra/config this fork doesn't have and are disabled.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  temporal:
    name: Temporal worker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: pip install -e ".[dev]"
        working-directory: temporal

      - name: Test Temporal suite
        working-directory: temporal
        # Fail loudly if the suite ever disappears — a green "tests" check that
        # runs zero assertions is worse than no check. Then run the real suite.
        run: |
          if [ -z "$(find tests -name 'test_*.py' -print -quit 2>/dev/null)" ]; then
            echo "## ❌ No Temporal tests found — failing on purpose" >> "$GITHUB_STEP_SUMMARY"
            echo "temporal/tests contains no test_*.py files; the suite must not silently pass." >&2
            exit 1
          fi
          python -m pytest tests -v

  validation-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [frontend, temporal]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## PR Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend lint & build | ${{ needs.frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Temporal worker tests | ${{ needs.temporal.result }} |" >> "$GITHUB_STEP_SUMMARY"
